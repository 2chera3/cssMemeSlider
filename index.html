<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1 user-scalable=yes"
    />
    <title>cssMemeSlider</title>
    <link rel="stylesheet" href="/cssMemeSlider/style.css" />
  </head>
  <body>
    <main class="page">
      <h1 class="page__title">🎮 cssMemeSlider</h1>

      <div class="slider">
        <input
          type="radio"
          name="slider"
          id="slide1"
          class="slider__radio"
          checked
        />
        <input type="radio" name="slider" id="slide2" class="slider__radio" />
        <input type="radio" name="slider" id="slide3" class="slider__radio" />
        <input type="radio" name="slider" id="slide4" class="slider__radio" />
        <input type="radio" name="slider" id="slide5" class="slider__radio" />
        <input type="radio" name="slider" id="slide6" class="slider__radio" />

        <div class="slider__content">
          <div class="slider__images">
            <div class="slider__image-item">
              <img
                class="slider__img"
                src="/cssMemeSlider/gif/office_1.gif"
                alt="Everybody dance now"
              />
            </div>
            <div class="slider__image-item">
              <img
                class="slider__img"
                src="/cssMemeSlider/gif/office_2.gif"
                alt="Hands up"
              />
            </div>
            <div class="slider__image-item">
              <img
                class="slider__img"
                src="/cssMemeSlider/gif/office_3.gif"
                alt="Champagne party"
              />
            </div>
            <div class="slider__image-item">
              <img
                class="slider__img"
                src="/cssMemeSlider/gif/office_4.gif"
                alt="Awkward moment"
              />
            </div>
            <div class="slider__image-item">
              <img
                class="slider__img"
                src="/cssMemeSlider/gif/office_5.gif"
                alt="Flying cat"
              />
            </div>
            <div class="slider__image-item">
              <img
                class="slider__img"
                src="/cssMemeSlider/gif/office_6.gif"
                alt="Wild west"
              />
            </div>
          </div>

          <div class="slider__captions">
            <div class="slider__caption">Everybody dance now 🪩</div>
            <div class="slider__caption">Hands up 🙌</div>
            <div class="slider__caption">Champagne party 🍾</div>
            <div class="slider__caption">Awkward moment 🤡</div>
            <div class="slider__caption">Flying cat 🙀</div>
            <div class="slider__caption">Wild west 🤠</div>
          </div>
        </div>

        <div class="slider__controls">
          <label
            for="slide1"
            class="slider__control-btn"
            aria-label="Слайд 1"
          ></label>
          <label
            for="slide2"
            class="slider__control-btn"
            aria-label="Слайд 2"
          ></label>
          <label
            for="slide3"
            class="slider__control-btn"
            aria-label="Слайд 3"
          ></label>
          <label
            for="slide4"
            class="slider__control-btn"
            aria-label="Слайд 4"
          ></label>
          <label
            for="slide5"
            class="slider__control-btn"
            aria-label="Слайд 5"
          ></label>
          <label
            for="slide6"
            class="slider__control-btn"
            aria-label="Слайд 6"
          ></label>
        </div>
      </div>

      <footer class="page__footer">
        <p>© pure CSS slider — no JS, just CSS</p>
        <p>2026</p>
      </footer>
    </main>
  </body>
</html>
